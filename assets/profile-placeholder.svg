<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for gradients and shadows -->
    <defs>
        <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#111827" />
            <stop offset="100%" stop-color="#030712" />
        </radialGradient>
        <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="50%" stop-color="#4f46e5" />
            <stop offset="100%" stop-color="#14b8a6" />
        </linearGradient>
        <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1f2937" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#111827" stop-opacity="0.9" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Background Card -->
    <rect width="400" height="400" rx="20" fill="url(#bgGradient)" />

    <!-- Technical Grid Background Pattern -->
    <path d="M 0,40 L 400,40 M 0,80 L 400,80 M 0,120 L 400,120 M 0,160 L 400,160 M 0,200 L 400,200 M 0,240 L 400,240 M 0,280 L 400,280 M 0,320 L 400,320 M 0,360 L 400,360" stroke="#1f2937" stroke-width="1" stroke-opacity="0.3" />
    <path d="M 40,0 L 40,400 M 80,0 L 80,400 M 120,0 L 120,400 M 160,0 L 160,400 M 200,0 L 200,400 M 240,0 L 240,400 M 280,0 L 280,400 M 320,0 L 320,400 M 360,0 L 360,400" stroke="#1f2937" stroke-width="1" stroke-opacity="0.3" />

    <!-- Tech/AI Abstract Nodes in Background -->
    <circle cx="90" cy="90" r="4" fill="#14b8a6" opacity="0.4" />
    <circle cx="310" cy="110" r="6" fill="#6366f1" opacity="0.3" />
    <circle cx="80" cy="270" r="5" fill="#f59e0b" opacity="0.3" />
    <path d="M 90,90 L 140,110 M 310,110 L 260,140" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,2" />

    <!-- Concentric Orbit Circles -->
    <circle cx="200" cy="200" r="140" stroke="url(#neonGradient)" stroke-width="1.5" stroke-dasharray="3,9" opacity="0.4" />
    <circle cx="200" cy="200" r="115" stroke="#14b8a6" stroke-width="1" stroke-dasharray="8,4" opacity="0.25" />

    <!-- Avatar Silhouette -->
    <!-- Head -->
    <circle cx="200" cy="155" r="50" fill="url(#avatarGradient)" stroke="url(#neonGradient)" stroke-width="2" />
    <!-- Shoulders -->
    <path d="M 110,320 C 110,260 145,230 200,230 C 255,230 290,260 290,320 Z" fill="url(#avatarGradient)" stroke="url(#neonGradient)" stroke-width="2" />

    <!-- Glowing Brain/AI Accent Nodes inside Head -->
    <circle cx="185" cy="140" r="3" fill="#14b8a6" filter="url(#glow)" />
    <circle cx="215" cy="140" r="3" fill="#6366f1" filter="url(#glow)" />
    <circle cx="200" cy="160" r="3.5" fill="#f59e0b" filter="url(#glow)" />
    <path d="M 185,140 L 200,160 L 215,140" stroke="url(#neonGradient)" stroke-width="1" stroke-opacity="0.7" />

    <!-- Futuristic Overlay Textures (Binary data) -->
    <text x="50" y="350" fill="#14b8a6" font-family="monospace" font-size="10" opacity="0.3">AIOps.active = true</text>
    <text x="270" y="350" fill="#6366f1" font-family="monospace" font-size="10" opacity="0.3">agent_nets = 100%</text>
</svg>
